<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yovex AI — Professional AI Voice Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CSS THEME (BLACK & RED)
═══════════════════════════════════════════ */
:root { --red: #e8162a; --bg: #070709; --bg2: #111115; }
body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; overflow: hidden; }

/* Auth Screen */
.auth-container { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; align-items: center; justify-content: center; transition: 1s; }
.auth-card { background: var(--bg2); padding: 40px; border: 1px solid #333; border-radius: 10px; text-align: center; width: 400px; }
.auth-card h1 { font-family: 'Orbitron'; color: var(--red); margin-bottom: 20px; }
.code-group { display: flex; gap: 10px; justify-content: center; margin: 25px 0; }
.code-input { width: 45px; height: 55px; background: #000; border: 1px solid #444; color: var(--red); text-align: center; font-size: 24px; border-radius: 5px; }
.btn-primary { background: var(--red); color: white; border: none; padding: 12px 30px; cursor: pointer; font-family: 'Orbitron'; width: 100%; border-radius: 5px; }

/* Main App */
.app-container { opacity: 0; visibility: hidden; transition: 1s; padding: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; }
.status-pill { background: #1a1a1a; padding: 5px 15px; border-radius: 20px; font-size: 14px; border: 1px solid var(--red); }
.dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 50px; }
.card { background: var(--bg2); border: 1px solid #222; padding: 30px; border-radius: 15px; transition: 0.3s; cursor: pointer; }
.card:hover { border-color: var(--red); transform: translateY(-5px); }
.card h3 { font-family: 'Orbitron'; color: var(--red); }

/* Upload Area */
.upload-area { margin-top: 20px; display: none; background: #000; padding: 20px; border-radius: 10px; border: 1px dashed var(--red); }

/* Notification */
#notif { position: fixed; top: 20px; right: -300px; background: var(--bg2); border-left: 4px solid var(--red); padding: 15px; transition: 0.5s; z-index: 10000; }
#notif.show { right: 20px; }
</style>
</head>
<body>

<div id="notif">
    <strong id="n-title"></strong><br>
    <span id="n-msg"></span>
</div>

<div class="auth-container" id="login-screen">
    <div class="auth-card">
        <h1>YOVEX AI<span>.</span></h1>
        <p>ENTER 6-DIGIT ACCESS CODE</p>
        <div class="code-group">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
        </div>
        <button class="btn-primary" onclick="verifyAndLogin()">VERIFY & ACCESS</button>
    </div>
</div>

<div class="app-container" id="main-app">
    <div class="header">
        <h2 style="font-family:'Orbitron'; color:var(--red);">YOVEX STUDIO</h2>
        <div class="status-pill" id="gpu-status">🖥️ GPU: ACTIVE</div>
    </div>

    <div class="dashboard">
        <div class="card" onclick="openUpload('Training')">
            <h3>TRAIN MODEL</h3>
            <p>Upload voice samples to create your AI clone.</p>
            <div class="upload-area" id="up-Training">
                <input type="file" id="file-Training" accept="audio/*">
                <button class="btn-primary" style="margin-top:10px" onclick="startAI('Training')">PROCESS</button>
            </div>
        </div>
        <div class="card" onclick="openUpload('Cover')">
            <h3>AI COVER</h3>
            <p>Convert any song using your trained models.</p>
            <div class="upload-area" id="up-Cover">
                <input type="file" id="file-Cover" accept="audio/*">
                <button class="btn-primary" style="margin-top:10px" onclick="startAI('Cover')">PROCESS</button>
            </div>
        </div>
    </div>
</div>

<script>
// 1. نظام الدخول
function verifyAndLogin() {
    const inputs = document.querySelectorAll('.code-input');
    let code = "";
    inputs.forEach(input => code += input.value);

    // الكود هو 123456
    if(code === "123456") {
        showToast('SUCCESS', 'Access Granted. Welcome.');
        document.getElementById('login-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('login-screen').style.display = 'none';
            const app = document.getElementById('main-app');
            app.style.visibility = 'visible';
            app.style.opacity = '1';
        }, 1000);
    } else {
        showToast('ERROR', 'Invalid Security Code.');
    }
}

// 2. التحكم في واجهة الرفع
function openUpload(type) {
    document.querySelectorAll('.upload-area').forEach(el => el.style.display = 'none');
    document.getElementById('up-' + type).style.display = 'block';
}

// 3. محاكي الذكاء الاصطناعي (الباك إيند)
function startAI(type) {
    const fileInput = document.getElementById('file-' + type);
    if(!fileInput.files[0]) return showToast('WAIT', 'Please select a file first.');

    showToast('AI ENGINE', 'Processing your request on GPU...');
    document.getElementById('gpu-status').style.color = 'var(--red)';
    document.getElementById('gpu-status').textContent = '⚙️ PROCESSING...';

    setTimeout(() => {
        showToast('COMPLETE', `${type} finished successfully!`);
        document.getElementById('gpu-status').style.color = 'white';
